<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Thuyết Minh - Solar Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            margin: 0; 
            overflow-x: hidden; 
            color: #cbd5e1;
        }

        /* Video nền */
        #bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.15; 
            filter: saturate(1.5) hue-rotate(15deg);
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent, #020617 90%);
            z-index: -1;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tech-gradient-text {
            background: linear-gradient(to right, #22d3ee, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pill-accent {
            background: linear-gradient(135deg, #06b6d4 0%, #10b981 100%);
            color: #000;
            font-weight: 800;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        video.main-player {
            width: 100%;
            border-radius: 1.5rem;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <video autoplay muted loop id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <div class="max-w-5xl w-full relative z-10">
        
        <header class="text-center mb-10 space-y-2">
            <div class="inline-block pill-accent mb-4">Dự án STEM 2026</div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight">
                Video<span class="tech-gradient-text italic">Thuyết Minh </span>
            </h1>
            <p class="text-slate-400 font-medium">Hệ thống pin mặt trời thông minh</p>
        </header>

        <section class="glass-container p-4 md:p-8 relative">
            <video class="main-player" controls preload="metadata" poster="thumbnail.jpg">
                <source src="pWF2AmF0GwAAAZ2UYor4YWYAYXUOYXMaAZw0Vg.mp4" type="video/mp4">
                Trình duyệt của bạn không hỗ trợ xem video.
            </video>
            
            <div class="absolute -top-4 -right-4 hidden md:block">
                <div class="pill-accent rotate-3 hover:rotate-0 transition-transform duration-500">
                    Sáng tạo Thanh thiếu niên
                </div>
            </div>
        </section>

        <footer class="mt-16 text-center space-y-4">
            <div class="h-px w-24 bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent mx-auto"></div>
            <div class="legal text-[10px] uppercase tracking-[0.2em] opacity-40 leading-loose">
                <p><b>&copy; 2026 CKLH809In</b></p>
                <p>CKLH809In's Labs&trade; &bull; Powered by GitHub Pages</p>
            </div>
        </footer>
    </div>

    <a href="index.html" class="fixed bottom-8 left-8 glass-card px-6 py-3 rounded-full text-xs font-bold text-cyan-400 border border-white/10 hover:bg-white/5 transition-all">
       ← QUAY LẠI
    </a>

</body>
</html>
